<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu horizontal</title>

  <style>
    li {
      display: inline;
      color: blueviolet;
      padding-left: 10px;
    }

    li:hover{
      background-color: rgba(252, 240, 255, 0.384);
    }

    ul{
      background-color: black;
    }


  </style>
</head>

<body style="font-size: 30px;">
  <ul>
    <li>Cadastrar</li>
    <li>Alterar</li>
    <li>Consultar</li>
    <li>Excluir</li>
</body>

</html>
